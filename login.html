<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welfare Master - เข้าสู่ระบบ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f1f5f9; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-100 to-slate-200">

    <div class="glass-card max-w-md w-full p-8 rounded-3xl shadow-xl border border-slate-100 text-center relative overflow-hidden">
        <div class="absolute top-0 right-0 -mr-8 -mt-8 w-32 h-32 rounded-full bg-emerald-50 opacity-50"></div>
        <div class="absolute bottom-0 left-0 -ml-8 -mb-8 w-24 h-24 rounded-full bg-cyan-50 opacity-50"></div>

        <div class="relative z-10">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-r from-emerald-500 to-teal-600 text-white text-4xl mb-6 shadow-lg shadow-emerald-200">W</div>
            <h1 class="text-3xl font-bold text-slate-800 mb-2">Welfare Master</h1>
            <p class="text-slate-500 mb-8">ปลดล็อกศักยภาพทางการเงินเพื่อการเกษียณ</p>

            <div class="space-y-4">
                <button onclick="loginWithProvider('line')" class="w-full flex items-center justify-center gap-3 bg-[#00B900] hover:bg-[#009900] text-white py-3.5 px-6 rounded-xl font-medium transition-all shadow-md shadow-green-100">
                    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M24 10.304c0-5.369-5.383-9.738-12-9.738-6.616 0-12 4.369-12 9.738 0 4.814 4.269 8.846 10.036 9.608.391.084.922.258 1.057.592.122.299.08.705.039.998l-.189 1.134c-.052.327-.249 1.218 1.066.665 1.315-.552 7.098-4.181 9.66-7.149 1.545-1.789 2.331-3.692 2.331-5.848z"/>
                    </svg>
                    เข้าสู่ระบบด้วย LINE
                </button>

                <button onclick="loginWithProvider('google')" class="w-full flex items-center justify-center gap-3 bg-white hover:bg-slate-50 text-slate-700 py-3.5 px-6 rounded-xl font-medium transition-all shadow-sm border border-slate-200">
                    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    เข้าสู่ระบบด้วย Google
                </button>
            </div>
            
            <p class="text-xs text-slate-400 mt-8">การเข้าสู่ระบบถือเป็นการยอมรับข้อกำหนดและนโยบายความเป็นส่วนตัวของเรา ข้อมูลของคุณถูกเก็บอย่างปลอดภัย 100%</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ysvkdzbtxdibaeztqsht.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzdmtkemJ0eGRpYmFlenRxc2h0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1OTA3MDEsImV4cCI6MjA4ODE2NjcwMX0.BXNN_WU1LL61VaVHSw2AaN8Th6D1ZYx6H9azX75Ni1o';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ฟังก์ชันสร้าง URL สำหรับเด้งไปหน้า Dashboard ที่แม่นยำบน GitHub Pages
        function getDashboardUrl() {
            const pathArray = window.location.pathname.split('/');
            // ถอดชื่อไฟล์ login.html ออกจาก Path (ถ้ามี)
            if (pathArray[pathArray.length - 1].includes('.html')) {
                pathArray.pop();
            }
            const basePath = pathArray.join('/');
            const targetUrl = window.location.origin + basePath + '/userDashboard1.html';
            // ป้องกันเครื่องหมาย / เบิ้ลกัน
            return targetUrl.replace(/([^:]\/)\/+/g, "$1"); 
        }

        async function loginWithProvider(providerName) {
            try {
                const targetUrl = getDashboardUrl();
                const { data, error } = await supabase.auth.signInWithOAuth({
                    provider: providerName,
                    options: {
                        redirectTo: targetUrl
                    }
                });
                if (error) throw error;
            } catch (error) {
                console.error('Login error:', error.message);
                alert('เกิดข้อผิดพลาดในการเข้าสู่ระบบ: \n' + error.message);
            }
        }

        // 🌟 หัวใจสำคัญ: ระบบดักจับเมื่อล็อกอินสำเร็จ (แก้ปัญหาหน้าเว็บนิ่ง)
        supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' || session) {
                window.location.replace(getDashboardUrl());
            }
        });

        // เช็กเผื่อไว้ตอนโหลดหน้าเว็บ
        supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                window.location.replace(getDashboardUrl());
            }
        });
    </script>
</body>
</html>
